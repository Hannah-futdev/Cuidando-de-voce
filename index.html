<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuidando de você</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <button 
  id="theme-toggle" 
  class="theme-toggle"
  aria-label="Alternar entre modo claro e escuro"
  aria-pressed="false"
>🌙</button>
    <main>
        <header>
            <h1>Boas-vindas ao Cuidando de você!</h1>
            <h2>Quem irá cuidar da saúde hoje?</h2>
        </header>
        <section aria-labelledby="profiles-heading">
            <h3 id="profiles-heading">Perfis disponíveis</h3>
            <div class="profiles">
                <article class="profile">
                    <img src="assets/joana.png" alt="mulher negra usando blusa cinza e cabelo preso em um coque">
                    <h4>Joana</h4>
                    <p>Perfil adulto</p>
                </article>
                <article class="profile">
                    <img src="assets/maria (2).png" alt="adolescente de pele parda sorrindo usando blusa cinza e cabelo ondulado solto">
                    <h4>Maria</h4>
                    <p>Perfil adolescente</p>
                </article>
                <article class="profile">
                    <img src="assets/ivone.png" alt="idosa de pele clara usando blusa cinza e cabelo preso em um coque">
                    <h4>Ivone</h4>
                    <p>Perfil idosa</p>
                </article>
            </div>
        </section>
    </main>
    <script src="index.js"></script>
</body>
</html>
